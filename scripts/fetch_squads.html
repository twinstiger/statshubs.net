<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch Squad Data</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    h1 { color: #333; }
    .url-list { background: #f5f5f5; padding: 15px; border-radius: 8px; }
    .url-item { margin: 5px 0; font-family: monospace; font-size: 14px; }
    button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
    button:hover { background: #0056b3; }
    #status { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; }
    #output { margin-top: 20px; }
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: 12px; }
    .instructions { background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>📥 批量下载球队阵容数据</h1>

  <div class="instructions">
    <strong>使用说明：</strong>
    <ol>
      <li>打开浏览器开发者工具 (F12 或 Cmd+Option+I)</li>
      <li>切换到 Console (控制台) 标签</li>
      <li>复制下方脚本代码，粘贴到控制台并按回车</li>
      <li>等待所有数据获取完成，会自动下载 squads.json 文件</li>
    </ol>
  </div>

  <h2>所有球队 API 地址</h2>
  <div class="url-list" id="urls"></div>

  <div>
    <button onclick="fetchAll()">🚀 开始获取所有数据</button>
    <button onclick="downloadJson()">💾 下载 JSON</button>
  </div>

  <div id="status">状态: 等待开始...</div>
  <div id="output">
    <h3>JSON 输出 (复制此内容到 data/squads_raw.json)</h3>
    <textarea id="jsonOutput"></textarea>
  </div>

  <script>
    // 所有球队的 ID
    const teams = {
      // Group A
      'mexico': 11764,
      'south-korea': 10586,
      'czech': 10979,
      'south-africa': 10310,
      // Group B
      'switzerland': 10871,
      'canada': 11138,
      'qatar': 11289,
      'bosnia': 10478,
      // Group C
      'scotland': 10868,
      'morocco': 11763,
      'brazil': 10477,
      'haiti': 11089,
      // Group D
      'usa': 13611,
      'australia': 13832,
      'turkey': 13337,
      'paraguay': 13449,
      // Group E
      'germany': 11746,
      'ivory-coast': 11141,
      'ecuador': 11082,
      'curacao': 33203,
      // Group F
      'sweden': 10869,
      'japan': 14529,
      'netherlands': 10870,
      'tunisia': 13613,
      // Group G
      'new-zealand': 14400,
      'iran': 14298,
      'belgium': 10316,
      'egypt': 13464,
      // Group H
      'uruguay': 13447,
      'saudi-arabia': 10584,
      'spain': 14227,
      'cape-verde': 11083,
      // Group I
      'senegal': 13365,
      'iraq': 11288,
      'norway': 13820,
      // Group J
      'algeria': 23383,
      'austria': 13226,
      'jordan': 11267,
      // Group K
      'portugal': 13152,
      'dr-congo': 11142,
      'uzbekistan': 10582,
      'colombia': 10476,
      // Group L
      'england': 11079,
      'croatia': 11606,
      'ghana': 11017,
      'panama': 12064,
    };

    let results = {};
    let statusEl = document.getElementById('status');
    let jsonOutputEl = document.getElementById('jsonOutput');

    // 显示所有 URL
    const urlsDiv = document.getElementById('urls');
    Object.entries(teams).forEach(([slug, id]) => {
      const div = document.createElement('div');
      div.className = 'url-item';
      div.textContent = `${slug}: https://gw.m.163.com/base/worldCup/qatar/teamLineupInfo?teamId=${id}`;
      urlsDiv.appendChild(div);
    });

    async function fetchAll() {
      statusEl.textContent = '状态: 开始获取数据...';
      results = {};
      let count = 0;
      const total = Object.keys(teams).length;

      for (const [slug, id] of Object.entries(teams)) {
        count++;
        statusEl.textContent = `状态: 获取中 (${count}/${total}) - ${slug}`;

        try {
          const res = await fetch(`https://gw.m.163.com/base/worldCup/qatar/teamLineupInfo?teamId=${id}`);
          const data = await res.json();
          results[slug] = data;
          console.log(`✓ ${slug}: OK`);
        } catch (e) {
          console.error(`✗ ${slug}: ${e.message}`);
          results[slug] = { error: e.message };
        }
      }

      statusEl.textContent = `状态: 完成! 已获取 ${count} 个球队数据`;
      jsonOutputEl.value = JSON.stringify(results, null, 2);
      console.log('所有数据已获取完成!');
    }

    function downloadJson() {
      if (Object.keys(results).length === 0) {
        alert('请先点击 "开始获取所有数据"');
        return;
      }
      const blob = new Blob([JSON.stringify(results, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'squads_raw.json';
      a.click();
    }

    // 浏览器控制台脚本
    console.log('=== 复制以下代码到浏览器控制台运行 ===');
    console.log(`
async function fetchAllSquads() {
  const teams = ${JSON.stringify(teams, null, 2)};
  const results = {};

  for (const [slug, id] of Object.entries(teams)) {
    try {
      const res = await fetch(\`https://gw.m.163.com/base/worldCup/qatar/teamLineupInfo?teamId=\${id}\`);
      const data = await res.json();
      results[slug] = data;
      console.log(\`✓ \${slug}: OK\`);
    } catch (e) {
      console.error(\`✗ \${slug}: \${e.message}\`);
    }
  }

  const blob = new Blob([JSON.stringify(results, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'squads_raw.json';
  a.click();

  return results;
}
fetchAllSquads();
`);
  </script>
</body>
</html>
